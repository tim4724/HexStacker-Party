<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HexStacker — TV brand-asset renderer</title>
  <link rel="stylesheet" href="../public/shared/fonts/baloo2.css">
  <style>
    html, body { margin: 0; background: #06060f; }
    #stage { display: block; image-rendering: auto; }
  </style>
</head>
<body>
  <canvas id="stage" width="800" height="480"></canvas>
  <script src="../public/shared/theme.js"></script>
  <script>
  'use strict';
  // ============================================================
  // TV brand-asset renderer. The app icon is the brand triad: three flat-top
  // pillow cells (teal top-left, red below, honey right) in the party colorway
  // over a flat brand plum, floating above a soft drop shadow. It's the same
  // canonical mark as the favicon (artwork/generate-favicon-svg.js) and the
  // .brand-lockup wordmark; cell render matches CanvasUtils._stampHexPillow 1:1
  // so the icon never drifts from the game.
  //
  // Layers (for parallax): 'back'  = flat plum + the triad's drop shadow;
  //                        'front' = the triad cells on transparency;
  //                        'flat'  = both (previews / single images).
  // window.renderHexBrandLayer(spec) -> PNG data URL (alpha preserved).
  // window.renderLauncherIcon(spec)  -> Android legacy launcher icon PNG.
  // ============================================================
  const SQRT3 = Math.sqrt(3);
  function hexPath(ctx, cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i;
      const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }

  const HEX_UNIT_VERTICES = [];
  for (let _i = 0; _i < 6; _i++) { const _a = Math.PI / 3 * _i; HEX_UNIT_VERTICES.push(Math.cos(_a), Math.sin(_a)); }

  // Anti-banding dither. An 8-bit canvas quantizes the shallow dark-plum
  // radials into visible bands; sub-LSB triangular-PDF noise before
  // quantization dissolves them. Deterministic (hashed coords) so regenerated
  // assets stay byte-stable, and RGB-only so pixels a clip left transparent
  // (alpha 0) remain invisible.
  function _hash01(a, b) {
    let h = (a * 374761393 + b * 668265263) | 0;
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    h ^= h >>> 16;
    return (h >>> 0) / 4294967296;
  }
  function ditherRect(ctx, x, y, w, h, amp) {
    x = Math.max(0, Math.floor(x)); y = Math.max(0, Math.floor(y));
    w = Math.min(ctx.canvas.width - x, Math.ceil(w));
    h = Math.min(ctx.canvas.height - y, Math.ceil(h));
    if (w <= 0 || h <= 0) return;
    amp = amp == null ? 1 : amp;
    const img = ctx.getImageData(x, y, w, h);
    const d = img.data;
    for (let p = 0, i = 0; p < w * h; p++, i += 4) {
      const px = p % w, py = (p / w) | 0;
      const n = (_hash01(px, py) + _hash01(px + 101, py + 911) - 1) * amp;
      d[i] += n; d[i + 1] += n; d[i + 2] += n;
    }
    ctx.putImageData(img, x, y);
  }

  function hexPathRounded(ctx, cx, cy, size, radius) {
    if (radius <= 0) { hexPath(ctx, cx, cy, size); return; }
    const V = HEX_UNIT_VERTICES;
    ctx.beginPath();
    ctx.moveTo(cx + size * (V[10] + V[0]) / 2, cy + size * (V[11] + V[1]) / 2);
    for (let i = 0; i < 6; i++) {
      const a = (i * 2) % 12, b = ((i + 1) * 2) % 12;
      ctx.arcTo(cx + size * V[a], cy + size * V[a + 1], cx + size * V[b], cy + size * V[b + 1], radius);
    }
    ctx.closePath();
  }

  // Pillow cell — ported 1:1 from CanvasUtils _stampHexPillow (the level 6-10
  // style tier). Rounded corners + radial sheen + bottom shade line.
  function stampPillow(ctx, cx, cy, r, color) {
    const size = r * SQRT3;
    const cornerR = r * 0.15;
    const lineInset = cornerR / SQRT3;
    hexPathRounded(ctx, cx, cy, r, cornerR);
    ctx.fillStyle = color;
    ctx.fill();
    hexPathRounded(ctx, cx, cy, r, cornerR);
    ctx.save();
    ctx.clip();
    const g = ctx.createRadialGradient(cx - r * 0.05, cy - r * 0.1, 0, cx, cy, r * 1.1);
    g.addColorStop(0, 'rgba(255,255,255,0.3)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
    ctx.lineWidth = Math.max(0.5, size * 0.04);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.moveTo(cx + r * HEX_UNIT_VERTICES[2] - lineInset, cy + r * HEX_UNIT_VERTICES[3]);
    ctx.lineTo(cx + r * HEX_UNIT_VERTICES[4] + lineInset, cy + r * HEX_UNIT_VERTICES[5]);
    ctx.stroke();
  }

  // ============================================================
  // The brand triad — three mutually-adjacent flat-top pillow cells (teal
  // top-left, red below, honey right), the canonical mark shared with the
  // favicon (artwork/generate-favicon-svg.js) and the .brand-lockup wordmark.
  // Colors track PARTY_PALETTE slots 1/0/2 — kept in sync with the Android
  // adaptive-icon vector via artwork/generate-android-vectors.js.
  // ============================================================
  const TRIAD_CELLS = [[0, 0], [0, 1], [1, 0]];
  // Optical-centering nudge: fraction of the way from the triad's bbox center
  // toward its area centroid, sliding the mark right so the bright honey cell's
  // rightward pull reads as centered (see artwork/generate-favicon-svg.js's
  // OPTICAL_K note). The right amount depends on the frame shape: a CIRCLE mask
  // hides the bounding box, so it wants full center-of-mass centering (1.0); a
  // SQUARE/RECT frame shows the bounding box, so it wants a light nudge (0.35).
  const OPTICAL_K = 0.35;        // square / rectangular frames (tvOS, banner, square launcher)
  const OPTICAL_K_ROUND = 1.0;  // circular mask (dedicated round launcher)
  const PAL = (typeof PARTY_PALETTE !== 'undefined') ? PARTY_PALETTE.slice() : [];
  function triadColors() {
    return [PAL[1] || '#4ECDC4', PAL[0] || '#FF6B6B', PAL[2] || '#FFE066'];
  }
  function axialToOffset(q, r) { return { col: q, row: r + ((q - (q & 1)) >> 1) }; }
  // Centered cell layout for a hex piece (axial cells) — centers are relative
  // to the piece's bounding-box center, which is what gets pinned to the icon
  // center.
  function pieceCellCenters(cells, s, k) {
    const R = s * 0.95;
    const pts = cells.map(([q, r]) => { const o = axialToOffset(q, r); return [1.5 * s * o.col, SQRT3 * s * (o.row + 0.5 * (o.col & 1))]; });
    const xs = pts.map((p) => p[0]), ys = pts.map((p) => p[1]);
    const mx = (Math.min(...xs) - R + Math.max(...xs) + R) / 2;
    const my = (Math.min(...ys) - SQRT3 / 2 * R + Math.max(...ys) + SQRT3 / 2 * R) / 2;
    const gx = xs.reduce((a, b) => a + b, 0) / xs.length;   // area centroid x
    const dx = (k == null ? OPTICAL_K : k) * (mx - gx);     // optical nudge (rightward)
    return pts.map(([x, y]) => [x - mx + dx, y - my]);
  }
  function drawTriad(ctx, cx, cy, s, colors, k) {
    const cols = colors || triadColors();
    pieceCellCenters(TRIAD_CELLS, s, k).forEach(([x, y], i) => stampPillow(ctx, cx + x, cy + y, s * 0.95, cols[i]));
  }
  // Soft drop shadow below the triad — the floating-sticker depth cue. On
  // tvOS it lives on the back layer so the mark hovers over it in parallax.
  function drawTriadShadow(ctx, cx, cy, s, k) {
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.filter = `blur(${s * 0.30}px)`;
    ctx.fillStyle = '#0A0714';
    for (const [x, y] of pieceCellCenters(TRIAD_CELLS, s, k)) {
      hexPathRounded(ctx, cx + x, cy + y + s * 0.22, s * 0.95, s * 0.95 * 0.18);
      ctx.fill();
    }
    ctx.restore();
  }

  // ============================================================
  // Icon layer renderer. spec = {
  //   w, h, layer: 'back'|'front'|'flat',
  //   bg: css color (back layer fill — flat brand plum),
  //   mark: { nx, ny, sizeFrac, colors? }   nx/ny in 0..1; sizeFrac = s / h
  //   wordmark?: [line, ...]   when present, a row lockup (triad + wordmark)
  //     replaces the bare centered triad — used so the tvOS Home Screen (which
  //     shows no app-name label) carries the brand name, mirroring the Android
  //     TV leanback banner. The lockup is centred as a unit and auto-shrinks to
  //     fit the icon safe zone; the triad + text sit on FRONT and float over
  //     the triad's drop shadow on BACK in parallax.
  // }
  // ============================================================
  function renderHexBrandLayer(spec) {
    const W = spec.w, H = spec.h;
    const canvas = document.getElementById('stage');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    const b = spec.mark;

    if (spec.wordmark && spec.wordmark.length) {
      const lines = spec.wordmark;
      const cy = b.ny * H;
      // Auto-fit: start from sizeFrac and shrink the whole lockup until it fits
      // the safe width (leaves margin for the parallax shift on either side).
      const targetW = W * 0.86;
      const measure = (s) => {
        const fontPx = s * 1.7;
        ctx.font = `800 ${fontPx}px 'Baloo 2', sans-serif`;
        ctx.letterSpacing = `${fontPx * 0.06}px`;
        const textW = Math.max(...lines.map((t) => ctx.measureText(t).width));
        const gap = s * 0.85;
        const markW = 1.5 * s + 2 * (s * 0.95);
        return { fontPx, gap, markW, textW, total: markW + gap + textW };
      };
      let s = b.sizeFrac * H;
      let m = measure(s);
      for (let i = 0; i < 200 && m.total > targetW && s > 4; i++) { s *= 0.97; m = measure(s); }
      const x0 = (W - m.total) / 2;
      const triadCx = x0 + m.markW / 2;

      if (spec.layer === 'back' || spec.layer === 'flat') {
        ctx.fillStyle = spec.bg;
        ctx.fillRect(0, 0, W, H);
        drawTriadShadow(ctx, triadCx, cy, s);
      }
      if (spec.layer === 'front' || spec.layer === 'flat') {
        drawTriad(ctx, triadCx, cy, s, b.colors);
        ctx.save();
        ctx.font = `800 ${m.fontPx}px 'Baloo 2', sans-serif`;
        ctx.letterSpacing = `${m.fontPx * 0.06}px`;
        ctx.textAlign = 'left';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#F7F1E8';
        ctx.shadowColor = 'rgba(0,0,0,0.45)';
        ctx.shadowBlur = m.fontPx * 0.10;
        ctx.shadowOffsetY = Math.max(1, m.fontPx * 0.03);
        // Optical nudge down: 'middle' centres the em box, whose descender slack
        // sits below the all-caps mass, so the block reads high without it.
        const capNudge = m.fontPx * 0.07;
        const textLeft = x0 + m.markW + m.gap, lineStep = m.fontPx * 1.02;
        const yTop = cy - ((lines.length - 1) * lineStep) / 2 + capNudge;
        lines.forEach((t, i) => ctx.fillText(t, textLeft, yTop + i * lineStep));
        ctx.restore();
      }
      return canvas.toDataURL('image/png');
    }

    const cx = b.nx * W, cy = b.ny * H, s = b.sizeFrac * H;
    if (spec.layer === 'back' || spec.layer === 'flat') {
      ctx.fillStyle = spec.bg;
      ctx.fillRect(0, 0, W, H);
      drawTriadShadow(ctx, cx, cy, s);
    }
    if (spec.layer === 'front' || spec.layer === 'flat') {
      drawTriad(ctx, cx, cy, s, b.colors);
    }
    return canvas.toDataURL('image/png');
  }
  window.renderHexBrandLayer = renderHexBrandLayer;

  // Top Shelf (the fullscreen showcase): contain-fit a gameplay banner onto a
  // flat fill of the banner's own edge colour so the letterbox pillars are
  // seamless with the art (the banner is a uniform var(--bg-primary) #1E1A2B to
  // its edges — any gradient here would show a visible seam at the pillars).
  // Rich key art belongs here per Apple's tvOS HIG. Returns a PNG.
  function renderTopShelf(spec) {
    return new Promise((resolve, reject) => {
      const W = spec.w, H = spec.h;
      const canvas = document.getElementById('stage');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#1E1A2B';   // --bg-primary; matches gameplay-2x1.png edges
      ctx.fillRect(0, 0, W, H);
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(W / img.width, H / img.height);
        const nw = img.width * scale, nh = img.height * scale;
        ctx.drawImage(img, (W - nw) / 2, (H - nh) / 2, nw, nh);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = () => reject(new Error('banner image failed to load'));
      img.src = spec.bannerDataUrl;
    });
  }
  window.renderTopShelf = renderTopShelf;

  // Android legacy launcher icon (pre-adaptive fallback mipmaps). Mirrors the
  // adaptive icon exactly: the ic_launcher_background.xml radial mapped to the
  // 72dp visible crop of the 108dp grid, the triad at the adaptive foreground's
  // size (cell s = 12dp of the 72dp crop), masked to the legacy shape. No
  // drop shadow — VectorDrawables can't blur, so the adaptive icon has none
  // and the raster fallbacks match it.
  // spec = { size, shape: 'square'|'round' } -> PNG data URL.
  function renderLauncherIcon(spec) {
    const N = spec.size;
    const canvas = document.getElementById('stage');
    canvas.width = N; canvas.height = N;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, N, N);
    ctx.save();
    ctx.beginPath();
    if (spec.shape === 'round') ctx.arc(N / 2, N / 2, N * 0.49, 0, Math.PI * 2);
    else ctx.roundRect(N * 0.04, N * 0.04, N * 0.92, N * 0.92, N * 0.12);
    ctx.clip();
    const g = ctx.createRadialGradient(0.361 * N, 0.333 * N, 0, 0.361 * N, 0.333 * N, 1.278 * N);
    g.addColorStop(0, '#2A2540');
    g.addColorStop(0.62, '#1E1A2B');
    g.addColorStop(1, '#15121F');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, N, N);
    ditherRect(ctx, 0, 0, N, N);
    // Round mask hides the bounding box, so center the mark on its mass (1.0);
    // square mask shows the box, so use the light nudge (0.35).
    const k = spec.shape === 'round' ? OPTICAL_K_ROUND : OPTICAL_K;
    drawTriad(ctx, N / 2, N / 2, (12 / 72) * N, null, k);
    ctx.restore();
    return canvas.toDataURL('image/png');
  }
  window.renderLauncherIcon = renderLauncherIcon;

  // Android TV leanback banner (16:9, rendered natively at every density).
  // Google requires the logo with the app name, so this is the brand lockup: a
  // horizontal row of the triad mark beside the two-line "HEX"/"STACKER"
  // wordmark in cream Baloo 2 (no gradient), centred as a unit on the plum
  // radial. All geometry is fractional so each density renders natively (never
  // downscaled). Raster on purpose — the wordmark uses the real brand font a
  // VectorDrawable can only approximate.
  // spec = { w, h } -> PNG data URL.
  function renderBanner(spec) {
    const W = spec.w, H = spec.h;
    const canvas = document.getElementById('stage');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    // Plum radial backdrop.
    const RR = Math.max(W, H) * 0.85;
    const bg = ctx.createRadialGradient(W / 2, H * 0.42, 0, W / 2, H * 0.5, RR);
    bg.addColorStop(0, '#2E2748'); bg.addColorStop(1, '#161226');
    ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);
    ditherRect(ctx, 0, 0, W, H);
    // Row lockup — triad mark + two-line cream wordmark, centred as one unit
    // (proportions track the approved banner mockup, as fractions of banner
    // height so every density renders natively).
    const s = (19 / 180) * H;                  // triad cell size
    const fontPx = Math.round((34 / 180) * H); // wordmark line size
    const gap = (16 / 180) * H;                // mark → text gap
    const markW = 1.5 * s + 2 * (s * 0.95);    // triad bounding-box width
    ctx.font = `800 ${fontPx}px 'Baloo 2', sans-serif`;
    ctx.textBaseline = 'middle';
    ctx.letterSpacing = `${fontPx * 0.06}px`;
    const textW = Math.max(ctx.measureText('HEX').width, ctx.measureText('STACKER').width);
    const x0 = (W - (markW + gap + textW)) / 2;
    drawTriad(ctx, x0 + markW / 2, H / 2, s);
    ctx.save();
    ctx.textAlign = 'left';
    ctx.fillStyle = '#F7F1E8';
    ctx.shadowColor = 'rgba(0,0,0,0.45)';
    ctx.shadowBlur = fontPx * 0.10;
    ctx.shadowOffsetY = Math.max(1, fontPx * 0.03);
    // Optical vertical centering for the all-caps wordmark: textBaseline
    // 'middle' centers the em box, whose empty descender space sits below the
    // caps, so the visual cap mass lands above center and reads high. Nudge the
    // whole two-line block down by a fraction of the cap descent to compensate.
    const capNudge = fontPx * 0.07;
    const textLeft = x0 + markW + gap, lineStep = fontPx * 1.02;
    ctx.fillText('HEX', textLeft, H / 2 - lineStep / 2 + capNudge);
    ctx.fillText('STACKER', textLeft, H / 2 + lineStep / 2 + capNudge);
    ctx.restore();
    return canvas.toDataURL('image/png');
  }
  window.renderBanner = renderBanner;
  window.__TVOS_READY__ = true;
  </script>
</body>
</html>
