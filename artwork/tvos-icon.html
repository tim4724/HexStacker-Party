<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HexStacker — tvOS brand-asset renderer</title>
  <link rel="stylesheet" href="../public/shared/fonts/orbitron.css">
  <style>
    html, body { margin: 0; background: #06060f; }
    #stage { display: block; image-rendering: auto; }
  </style>
</head>
<body>
  <canvas id="stage" width="800" height="480"></canvas>
  <script src="../public/shared/theme.js"></script>
  <script>
  'use strict';
  // ============================================================
  // tvOS brand-asset renderer. Draws the HexStacker brand (radial plum
  // background, colorful pillow-style party hex pieces, gradient Orbitron
  // wordmark) into layered tvOS App Icon / Top Shelf artwork. Reuses the
  // exact PARTY_PALETTE from public/shared/theme.js and the same hex/cell
  // geometry as artwork/builder.html so the TV brand never drifts from web.
  //
  // Layers (for parallax): 'back'  = background + soft depth pieces;
  //                        'front' = crisp pieces + wordmark on transparency;
  //                        'flat'  = everything (single-image top shelf).
  // window.renderHexBrandLayer(spec) -> PNG data URL (alpha preserved).
  // ============================================================
  const SQRT3 = Math.sqrt(3);
  function hexPath(ctx, cx, cy, r) {
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const a = Math.PI / 3 * i;
      const x = cx + r * Math.cos(a), y = cy + r * Math.sin(a);
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }
  function hexToRgb(hex){const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);return m?{r:+('0x'+m[1]),g:+('0x'+m[2]),b:+('0x'+m[3])}:null;}
  function clamp255(v){return Math.max(0,Math.min(255,Math.round(v)));}
  function lighten(hex,pct){const c=hexToRgb(hex);if(!c)return hex;const f=1+pct/100;return `rgb(${clamp255(c.r*f)},${clamp255(c.g*f)},${clamp255(c.b*f)})`;}
  function darken(hex,pct){const c=hexToRgb(hex);if(!c)return hex;const f=1-pct/100;return `rgb(${clamp255(c.r*f)},${clamp255(c.g*f)},${clamp255(c.b*f)})`;}
  function rgba(hex,a){const c=hexToRgb(hex);if(!c)return hex;return `rgba(${c.r},${c.g},${c.b},${a})`;}

  const HEX_UNIT_VERTICES = [];
  for (let _i = 0; _i < 6; _i++) { const _a = Math.PI / 3 * _i; HEX_UNIT_VERTICES.push(Math.cos(_a), Math.sin(_a)); }

  function hexPathRounded(ctx, cx, cy, size, radius) {
    if (radius <= 0) { hexPath(ctx, cx, cy, size); return; }
    const V = HEX_UNIT_VERTICES;
    ctx.beginPath();
    ctx.moveTo(cx + size * (V[10] + V[0]) / 2, cy + size * (V[11] + V[1]) / 2);
    for (let i = 0; i < 6; i++) {
      const a = (i * 2) % 12, b = ((i + 1) * 2) % 12;
      ctx.arcTo(cx + size * V[a], cy + size * V[a + 1], cx + size * V[b], cy + size * V[b + 1], radius);
    }
    ctx.closePath();
  }

  // Pillow tier — ported 1:1 from CanvasUtils _stampHexPillow (matches the
  // cover-art cellStyle). Rounded corners + radial sheen + bottom shade line.
  function stampPillow(ctx, cx, cy, r, color) {
    const size = r * SQRT3;
    const cornerR = r * 0.15;
    const lineInset = cornerR / SQRT3;
    hexPathRounded(ctx, cx, cy, r, cornerR);
    ctx.fillStyle = color;
    ctx.fill();
    hexPathRounded(ctx, cx, cy, r, cornerR);
    ctx.save();
    ctx.clip();
    const g = ctx.createRadialGradient(cx - r * 0.05, cy - r * 0.1, 0, cx, cy, r * 1.1);
    g.addColorStop(0, 'rgba(255,255,255,0.3)');
    g.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = g;
    ctx.fill();
    ctx.restore();
    ctx.lineWidth = Math.max(0.5, size * 0.04);
    ctx.strokeStyle = 'rgba(0,0,0,0.25)';
    ctx.beginPath();
    ctx.moveTo(cx + r * HEX_UNIT_VERTICES[2] - lineInset, cy + r * HEX_UNIT_VERTICES[3]);
    ctx.lineTo(cx + r * HEX_UNIT_VERTICES[4] + lineInset, cy + r * HEX_UNIT_VERTICES[5]);
    ctx.stroke();
  }

  // Piece geometry — mirrors server/Piece.js + builder.html.
  const PIECES = {
    I3: [[-1,0],[0,0],[1,0]],
    V3: [[-1,0],[0,0],[0,1]],
    T3: [[1,0],[0,0],[0,1]],
    o:  [[-1,0],[0,0],[0,-1],[1,-1]],
    d:  [[0,-1],[0,0],[0,1],[1,0]],
    b:  [[0,-1],[0,0],[0,1],[-1,0]],
  };
  const PIECE_SLOT = { I3: 0, V3: 1, T3: 2, o: 3, d: 4, b: 5 };
  const PAL = (typeof PARTY_PALETTE !== 'undefined') ? PARTY_PALETTE.slice() : ['#FF5C5C'];
  function pieceColor(type){ return PAL[PIECE_SLOT[type]] || '#FF5C5C'; }

  function rotateAxialCW(q, r) { return [-r, q + r]; }
  function rotatedCells(type, rot) {
    const n = ((rot | 0) % 6 + 6) % 6;
    let cells = PIECES[type].map(c => c.slice());
    for (let i = 0; i < n; i++) cells = cells.map(([q, r]) => rotateAxialCW(q, r));
    return cells;
  }
  function axialToOffset(q, r) { return { col: q, row: r + ((q - (q & 1)) >> 1) }; }
  function pieceHexCenter(bx, by, col, row, hexSize) {
    const colW = 1.5 * hexSize, hexH = SQRT3 * hexSize;
    return [bx + colW * col + hexSize, by + hexH * (row + 0.5 * (col & 1)) + hexH / 2];
  }
  // Center a piece on (cx, cy): compute the cell centroid offset and subtract it.
  function pieceCentroidOffset(type, hexSize, rot) {
    const cells = rotatedCells(type, rot);
    let sx = 0, sy = 0;
    for (const [q, r] of cells) {
      const off = axialToOffset(q, r);
      const [hx, hy] = pieceHexCenter(0, 0, off.col, off.row, hexSize);
      sx += hx; sy += hy;
    }
    return [sx / cells.length, sy / cells.length];
  }
  function drawPiece(ctx, cx, cy, type, hexSize, rot, color) {
    const cells = rotatedCells(type, rot);
    const [ox, oy] = pieceCentroidOffset(type, hexSize, rot);
    const col = color || pieceColor(type);
    for (const [q, r] of cells) {
      const off = axialToOffset(q, r);
      const [hx, hy] = pieceHexCenter(cx - ox, cy - oy, off.col, off.row, hexSize);
      stampPillow(ctx, hx, hy, hexSize * 0.95, col);
    }
  }
  // Soft glow stamp of a piece (for the back/depth layer).
  function drawPieceGlow(ctx, cx, cy, type, hexSize, rot, alpha, blur) {
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.filter = `blur(${blur}px)`;
    drawPiece(ctx, cx, cy, type, hexSize, rot, pieceColor(type));
    ctx.restore();
  }

  // ============================================================
  // Background — radial plum, identical palette to artwork/builder.html
  // paintBackground('radial'), scaled to any aspect.
  // ============================================================
  function paintRadial(ctx, W, H) {
    const R = Math.max(W, H) * 0.85;
    const g = ctx.createRadialGradient(W/2, H*0.42, 0, W/2, H*0.5, R);
    g.addColorStop(0, '#2E2748');
    g.addColorStop(1, '#120F1C');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
  }

  // ============================================================
  // Wordmark — gradient Orbitron, mirrors .gradient-title (theme.css) and
  // builder.html titleGradient. Renders 1 or 2 lines, auto-fit to maxWidth.
  // ============================================================
  function titleGradient(ctx, x0, x1) {
    const g = ctx.createLinearGradient(x0, 0, x1, 0);
    const stops = ['#FF6B6B', '#FF8C42', '#FFE066', '#7BED6F', '#4ECDC4', '#5B7FFF', '#A78BFA', '#F178D8'];
    stops.forEach((c, i) => g.addColorStop(i / (stops.length - 1), c));
    return g;
  }
  function fitFontSize(ctx, text, targetSize, maxWidth, weight) {
    let size = targetSize; const w = weight || '900';
    ctx.font = `${w} ${size}px Orbitron, sans-serif`;
    let safety = 120;
    while (ctx.measureText(text).width > maxWidth && size > 8 && safety-- > 0) {
      size = Math.max(8, size * 0.96);
      ctx.font = `${w} ${Math.round(size)}px Orbitron, sans-serif`;
    }
    return Math.round(size);
  }
  function drawWordmark(ctx, W, wm) {
    const lines = wm.lines;
    const maxW = W * (wm.maxWidthFrac ?? 0.84);
    const target = wm.sizeFrac * (wm.refH || W);
    // Fit every line to the same size (smallest that fits all).
    let size = target;
    for (const ln of lines) size = Math.min(size, fitFontSize(ctx, ln, target, maxW, '900'));
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `900 ${size}px Orbitron, sans-serif`;
    const lineH = size * (wm.lineHeight ?? 1.02);
    const totalH = (lines.length - 1) * lineH;
    const cy = wm.cy;
    ctx.shadowColor = 'rgba(0,0,0,0.55)';
    ctx.shadowBlur = size * 0.14;
    ctx.shadowOffsetY = Math.max(2, size * 0.04);
    // gradient spans the widest line's extent, centered
    let widest = 0;
    for (const ln of lines) widest = Math.max(widest, ctx.measureText(ln).width);
    const gx0 = W/2 - widest/2, gx1 = W/2 + widest/2;
    ctx.fillStyle = titleGradient(ctx, gx0, gx1);
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], W/2, cy - totalH/2 + i * lineH);
    }
    ctx.restore();
  }

  // Letter-spaced subtitle ("PARTY") — mirrors builder.html drawSubtitle
  // 'letterSpaced' / the social-preview lockup.
  function drawSubtitleSpaced(ctx, W, text, cy, size, color) {
    ctx.save();
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.font = `700 ${size}px Orbitron, sans-serif`;
    ctx.fillStyle = color || 'rgba(247,241,232,0.88)';
    ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.shadowBlur = size * 0.2;
    const letters = text.split('');
    let maxLetterW = 0;
    for (const ch of letters) maxLetterW = Math.max(maxLetterW, ctx.measureText(ch).width);
    const spacing = Math.max(size * 0.95, maxLetterW * 1.45);
    const baseX = W / 2 - spacing * (letters.length - 1) / 2;
    for (let i = 0; i < letters.length; i++) ctx.fillText(letters[i], baseX + i * spacing, cy);
    ctx.restore();
  }

  // Downward motion trail behind a falling piece — ported from builder.html
  // drawPieceTrail, adapted to centroid-centered piece coords.
  function drawPieceTrail(ctx, cx, cy, type, hexSize, rot, length) {
    if (!length) return;
    const color = pieceColor(type);
    const cells = rotatedCells(type, rot);
    const [ox, oy] = pieceCentroidOffset(type, hexSize, rot);
    const topByX = new Map();
    for (const [q, r] of cells) {
      const off = axialToOffset(q, r);
      const [hx, hy] = pieceHexCenter(cx - ox, cy - oy, off.col, off.row, hexSize);
      const key = Math.round(hx);
      const prev = topByX.get(key);
      if (!prev || hy < prev[1]) topByX.set(key, [hx, hy]);
    }
    const hexH = SQRT3 * hexSize, flatWidth = hexSize, intensity = 0.30, blurPx = hexSize * 0.18;
    for (const [hx, hy] of topByX.values()) {
      const headY = hy - hexH / 2, tailY = headY - length;
      ctx.save();
      ctx.filter = `blur(${blurPx}px)`;
      const grad = ctx.createLinearGradient(0, tailY, 0, headY);
      grad.addColorStop(0, rgba(color, 0));
      grad.addColorStop(0.75, rgba(color, intensity * 0.25));
      grad.addColorStop(1, rgba(color, intensity));
      ctx.fillStyle = grad;
      ctx.fillRect(hx - flatWidth / 2, tailY, flatWidth, length);
      ctx.restore();
    }
  }

  // ============================================================
  // Layout interpreter. spec = {
  //   w, h, layer:'back'|'front'|'flat', refForSize,
  //   backPieces:[{type,nx,ny,sizeFrac,rot,alpha,blurFrac}],
  //   pieces:[{type,nx,ny,sizeFrac,rot}],
  //   wordmark:{lines, ncy, sizeFrac, maxWidthFrac, lineHeight} | null
  // }  nx/ny are 0..1 of w/h; sizeFrac is hex circumradius / h.
  // ============================================================
  function renderHexBrandLayer(spec) {
    const W = spec.w, H = spec.h;
    const canvas = document.getElementById('stage');
    canvas.width = W; canvas.height = H;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, W, H);
    const drawBack = spec.layer === 'back' || spec.layer === 'flat';
    const drawFront = spec.layer === 'front' || spec.layer === 'flat';

    if (drawBack) {
      paintRadial(ctx, W, H);
      for (const p of (spec.backPieces || [])) {
        drawPieceGlow(ctx, p.nx * W, p.ny * H, p.type, p.sizeFrac * H, p.rot || 0,
                      p.alpha ?? 0.5, (p.blurFrac ?? 0.04) * H);
      }
    }
    if (drawFront) {
      // trails first so the pieces render on top
      for (const p of (spec.pieces || [])) {
        if (p.trailFrac) drawPieceTrail(ctx, p.nx * W, p.ny * H, p.type, p.sizeFrac * H, p.rot || 0, p.trailFrac * H);
      }
      for (const p of (spec.pieces || [])) {
        drawPiece(ctx, p.nx * W, p.ny * H, p.type, p.sizeFrac * H, p.rot || 0);
      }
      if (spec.wordmark) {
        drawWordmark(ctx, W, {
          lines: spec.wordmark.lines,
          cy: (spec.wordmark.ncy ?? 0.5) * H,
          sizeFrac: spec.wordmark.sizeFrac,
          refH: H,
          maxWidthFrac: spec.wordmark.maxWidthFrac,
          lineHeight: spec.wordmark.lineHeight,
        });
        if (spec.wordmark.subtitle) {
          const st = spec.wordmark.subtitle;
          drawSubtitleSpaced(ctx, W, st.text, (st.ncy ?? 0.66) * H, st.sizeFrac * H, st.color);
        }
      }
    }
    return canvas.toDataURL('image/png');
  }
  window.renderHexBrandLayer = renderHexBrandLayer;

  // Top Shelf (the fullscreen showcase): contain-fit a gameplay banner onto the
  // plum radial so the side margins blend with the banner's own dark-plum
  // background. Rich key art belongs here per Apple's tvOS HIG. Returns a PNG.
  function renderTopShelf(spec) {
    return new Promise((resolve, reject) => {
      const W = spec.w, H = spec.h;
      const canvas = document.getElementById('stage');
      canvas.width = W; canvas.height = H;
      const ctx = canvas.getContext('2d');
      paintRadial(ctx, W, H);
      const img = new Image();
      img.onload = () => {
        const scale = Math.min(W / img.width, H / img.height);
        const nw = img.width * scale, nh = img.height * scale;
        ctx.drawImage(img, (W - nw) / 2, (H - nh) / 2, nw, nh);
        resolve(canvas.toDataURL('image/png'));
      };
      img.onerror = () => reject(new Error('banner image failed to load'));
      img.src = spec.bannerDataUrl;
    });
  }
  window.renderTopShelf = renderTopShelf;
  window.__TVOS_READY__ = true;
  </script>
</body>
</html>
