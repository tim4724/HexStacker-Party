<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../public/shared/fonts/orbitron.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: #06060f;
      width: 100vw;
      height: 100vh;
    }

    canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      /* Radial glow behind title, matching welcome screen */
      background: radial-gradient(ellipse at 50% 50%, rgba(0, 80, 200, 0.18) 0%, transparent 55%);
    }

    h1 {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 128px;
      letter-spacing: 0.06em;
      background: linear-gradient(135deg, #4444ff, #00c8ff, #00ff88);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 32px rgba(0, 200, 255, 0.4));
      text-align: center;
      line-height: 1.0;
      white-space: nowrap;
    }

    h1 .sub {
      display: block;
      font-size: 0.38em;
      font-weight: 600;
      letter-spacing: 0.55em;
      margin-top: 0.28em;
      text-transform: uppercase;
      /* Opt out of gradient text clip so subtitle renders with opaque color */
      -webkit-text-fill-color: #e0e0ff;
      color: #e0e0ff;
      opacity: 0.82;
    }
  </style>
</head>
<body>
  <canvas id="bg"></canvas>
  <div class="overlay">
    <h1>HEX STACKER<span class="sub">party</span></h1>
  </div>

  <script>
    // Canonical hex palette (mirrors public/shared/theme.js PIECE_COLORS 1..8).
    const PIECE_COLORS = {
      I: '#EE4444', O: '#7FFF00', S: '#9B59F0', Z: '#FF8C00',
      q: '#FFD700', p: '#00CED1', L: '#FF1493', J: '#3377FF',
    };

    // Hex piece shapes in axial (q, r) coordinates — mirror server/HexPiece.js
    // base orientations. Shapes used purely as decorative silhouettes here.
    const HEX_PIECES = {
      I: [[0,0],[1,0],[2,0],[3,0]],
      O: [[0,0],[1,0],[0,1],[1,1]],
      S: [[0,0],[1,0],[1,-1],[2,-1]],
      Z: [[0,0],[1,0],[2,-1],[3,-1]],
      q: [[-1,0],[0,0],[1,0],[1,-1]],
      p: [[-1,1],[0,0],[1,-1],[-1,0]],
      L: [[-1,1],[0,0],[1,-1],[1,-2]],
      J: [[1,0],[0,0],[-1,0],[-1,-1]],
    };
    const KEYS = Object.keys(HEX_PIECES);

    // Rotate axial (q, r) 60° clockwise: (q, r) → (-r, q + r)
    function rotateAxial(cells, times) {
      let out = cells;
      for (let t = 0; t < times; t++) {
        out = out.map(([q, r]) => [-r, q + r]);
      }
      return out;
    }

    // Deterministic seeded random for reproducible banners
    let seed = 42;
    function rand() {
      seed = (seed * 16807 + 0) % 2147483647;
      return (seed - 1) / 2147483646;
    }

    const canvas = document.getElementById('bg');
    const ctx = canvas.getContext('2d');
    const W = window.innerWidth;
    const H = window.innerHeight;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

    // Flat-top hex cell helpers
    const SQRT3 = Math.sqrt(3);
    function hexPath(cx, cy, size) {
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = Math.PI / 3 * i;
        const x = cx + size * Math.cos(a);
        const y = cy + size * Math.sin(a);
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.closePath();
    }

    // Collision grid to prevent overlapping pieces
    const CELL = 8; // grid resolution in px
    const gridCols = Math.ceil(W / CELL);
    const gridRows = Math.ceil(H / CELL);
    const occupied = new Uint8Array(gridCols * gridRows);

    function cellCenters(cells, hexR) {
      // Flat-top axial → pixel offsets relative to piece origin.
      return cells.map(([q, r]) => {
        const cx = 1.5 * hexR * q;
        const cy = SQRT3 * hexR * (r + q / 2);
        return [cx, cy];
      });
    }

    function markOccupied(px, py, centers, hexR, pad) {
      for (const [dx, dy] of centers) {
        const x0 = Math.floor((px + dx - hexR - pad) / CELL);
        const y0 = Math.floor((py + dy - hexR * SQRT3 / 2 - pad) / CELL);
        const x1 = Math.ceil((px + dx + hexR + pad) / CELL);
        const y1 = Math.ceil((py + dy + hexR * SQRT3 / 2 + pad) / CELL);
        for (let gy = Math.max(0, y0); gy < Math.min(gridRows, y1); gy++) {
          for (let gx = Math.max(0, x0); gx < Math.min(gridCols, x1); gx++) {
            occupied[gy * gridCols + gx] = 1;
          }
        }
      }
    }

    function collides(px, py, centers, hexR, pad) {
      for (const [dx, dy] of centers) {
        const x0 = Math.floor((px + dx - hexR - pad) / CELL);
        const y0 = Math.floor((py + dy - hexR * SQRT3 / 2 - pad) / CELL);
        const x1 = Math.ceil((px + dx + hexR + pad) / CELL);
        const y1 = Math.ceil((py + dy + hexR * SQRT3 / 2 + pad) / CELL);
        for (let gy = Math.max(0, y0); gy < Math.min(gridRows, y1); gy++) {
          for (let gx = Math.max(0, x0); gx < Math.min(gridCols, x1); gx++) {
            if (occupied[gy * gridCols + gx]) return true;
          }
        }
      }
      return false;
    }

    // Color manipulation helpers (match CanvasUtils.js)
    function lightenColor(hex, percent) {
      const rgb = hexToRgb(hex);
      if (!rgb) return hex;
      const f = 1 + percent / 100;
      return `rgb(${Math.min(255, Math.round(rgb.r * f))}, ${Math.min(255, Math.round(rgb.g * f))}, ${Math.min(255, Math.round(rgb.b * f))})`;
    }
    function darkenColor(hex, percent) {
      const rgb = hexToRgb(hex);
      if (!rgb) return hex;
      const f = 1 - percent / 100;
      return `rgb(${Math.round(rgb.r * f)}, ${Math.round(rgb.g * f)}, ${Math.round(rgb.b * f)})`;
    }
    function hexToRgb(hex) {
      const m = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
      return m ? { r: parseInt(m[1], 16), g: parseInt(m[2], 16), b: parseInt(m[3], 16) } : null;
    }

    // Place pieces with collision avoidance
    const pieces = [];
    const PAD = 12;
    let attempts = 0;
    const MAX_ATTEMPTS = 2000;

    while (pieces.length < 22 && attempts < MAX_ATTEMPTS) {
      attempts++;
      const key = KEYS[Math.floor(rand() * KEYS.length)];
      const rotated = rotateAxial(HEX_PIECES[key], Math.floor(rand() * 6));
      const hexR = 14 + rand() * 18; // 14-32px
      const centers = cellCenters(rotated, hexR);
      const x = rand() * W;
      const y = rand() * H;
      // Boost low-luminance colors so pink/blue pieces stay visible against dark bg
      const boost = (key === 'L' || key === 'J') ? 0.08 : (key === 'I' || key === 'S') ? 0.04 : 0;
      const opacity = 0.08 + rand() * 0.06 + boost;

      if (collides(x, y, centers, hexR, PAD)) continue;

      markOccupied(x, y, centers, hexR, PAD);
      pieces.push({
        centers, hexR, opacity,
        color: PIECE_COLORS[key],
        x, y,
      });
    }

    // Draw all pieces — flat-top hex with gradient fill + shine/shadow
    for (const p of pieces) {
      ctx.globalAlpha = p.opacity;
      const hexR = p.hexR;
      const sCell = hexR * 0.94;
      for (const [dx, dy] of p.centers) {
        const cx = p.x + dx;
        const cy = p.y + dy;
        // Base gradient fill
        hexPath(cx, cy, sCell);
        const grad = ctx.createLinearGradient(cx, cy - sCell, cx, cy + sCell);
        grad.addColorStop(0, lightenColor(p.color, 15));
        grad.addColorStop(1, darkenColor(p.color, 10));
        ctx.fillStyle = grad;
        ctx.fill();
        // Bottom shadow via clip
        hexPath(cx, cy, sCell);
        ctx.save();
        ctx.clip();
        ctx.fillStyle = 'rgba(0, 0, 0, 0.22)';
        ctx.fillRect(cx - sCell, cy, sCell * 2, sCell);
        // Top highlight
        ctx.fillStyle = 'rgba(255, 255, 255, 0.22)';
        ctx.fillRect(cx - sCell * 0.5, cy - sCell * 0.88, sCell, sCell * 0.12);
        ctx.restore();
      }
      ctx.globalAlpha = 1;
    }
  </script>
</body>
</html>
