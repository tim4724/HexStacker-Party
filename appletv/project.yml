# XcodeGen spec for the tvOS app. Generate the .xcodeproj with:
#   brew install xcodegen   # one time
#   cd appletv && xcodegen generate && open HexStacker.xcodeproj
#
# The project is generated (git-ignored) so this YAML is the reviewable source
# of truth. The app depends on the local HexStackerKit Swift package and bundles
# the canonical engine JS via a pre-build script (see scripts/sync-engine.sh).
name: HexStacker
options:
  bundleIdPrefix: com.hexstacker
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

packages:
  HexStackerKit:
    path: .
  # WebRTC input fastlane (peer-to-peer controller input). Drives
  # Sources/HexStackerTV/WebRTCFastlane.swift, which is gated on
  # `#if canImport(LiveKitWebRTC)` — remove this package and the app falls back to
  # relay-only input. LiveKit's distribution is the WebRTC binary that ships tvOS
  # slices (stasel/WebRTC is iOS/macOS only). The netcode it drives is verified by
  # FastlaneTests (`swift test`); the adapter is built for the tvOS Simulator here.
  LiveKitWebRTC:
    url: https://github.com/livekit/webrtc-xcframework
    exactVersion: "144.7559.10"

targets:
  HexStackerTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/HexStackerTV
        excludes:
          - "Generated/**"          # mirrored engine JS, added as a folder ref below
          - "Info.plist"            # generated by XcodeGen; not a source/resource
          - "PrivacyInfo.xcprivacy" # added explicitly below so it lands in resources
      # Apple privacy manifest — must ship at the app-bundle root named
      # PrivacyInfo.xcprivacy (empty: no tracking, no data, no required-reason APIs).
      - path: Sources/HexStackerTV/PrivacyInfo.xcprivacy
        buildPhase: resources
      # Engine JS copied at build time; folder reference so it ships as a
      # directory "engine/" inside the app bundle regardless of contents.
      - path: Sources/HexStackerTV/Generated/engine
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - package: HexStackerKit
        product: HexStackerKit
      - package: LiveKitWebRTC
        product: LiveKitWebRTC
    info:
      path: Sources/HexStackerTV/Info.plist
      properties:
        CFBundleDisplayName: HexStacker
        UIRequiredDeviceCapabilities: [arm64]
        GCSupportsControllerUserInteraction: true
        # Only standard TLS (wss/https) is used — exempt from export compliance,
        # so uploads skip the per-build encryption questionnaire.
        ITSAppUsesNonExemptEncryption: false
        # Bundled variable fonts (Resources/fonts/): Orbitron for the HUD voice,
        # Baloo 2 for the brand voice (wordmark lockup, buttons).
        UIAppFonts:
          - "Orbitron[wght].ttf"
          - "Baloo2[wght].ttf"
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "3"            # tvOS
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        # LiveKitWebRTC ships only an arm64 tvOS-Simulator slice (no x86_64), so a
        # generic/CI simulator build that targets both archs fails to link the
        # x86_64 binary. Apple Silicon + real devices are arm64; exclude x86_64 for
        # the simulator SDK so `xcodebuild -sdk appletvsimulator` links cleanly.
        EXCLUDED_ARCHS[sdk=appletvsimulator*]: x86_64
    # Run the UI test bundle under this scheme's test action so
    # `xcodebuild -scheme HexStackerTV test` picks it up (screenshot capture +
    # remote-driven smoke). The app itself needs no test-only code: the tests
    # select state via the existing HEXSHOT / HEXDEMO launch hooks.
    scheme:
      testTargets:
        - HexStackerTVUITests
    preBuildScripts:
      - name: Sync engine JS
        basedOnDependencyAnalysis: false
        script: |
          "${PROJECT_DIR}/scripts/sync-engine.sh" \
            "${PROJECT_DIR}/Sources/HexStackerTV/Generated/engine"

  # XCUITest bundle: launches the app (via the HEXSHOT / HEXDEMO hooks set through
  # launchEnvironment) to capture per-screen screenshots and drive the Siri Remote.
  # Not part of the SwiftPM package; tvOS-only, so it builds through the Xcode
  # project like the app target.
  HexStackerTVUITests:
    type: bundle.ui-testing
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: HexStackerTV
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "3"
        SWIFT_VERSION: "5.9"
        EXCLUDED_ARCHS[sdk=appletvsimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: "YES"   # test bundle has no committed Info.plist
