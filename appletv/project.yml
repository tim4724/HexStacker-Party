# XcodeGen spec for the tvOS app. Generate the .xcodeproj with:
#   brew install xcodegen   # one time
#   cd appletv && xcodegen generate && open HexStacker.xcodeproj
#
# The project is generated (git-ignored) so this YAML is the reviewable source
# of truth. The app depends on the local HexStackerKit Swift package and bundles
# the canonical engine JS via a pre-build script (see scripts/sync-engine.sh).
name: HexStacker
options:
  bundleIdPrefix: com.hexstacker
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

packages:
  HexStackerKit:
    path: .
  # WebRTC input fastlane (peer-to-peer controller input). Drives
  # Sources/HexStackerTV/WebRTCFastlane.swift, which is gated on
  # `#if canImport(LiveKitWebRTC)` — remove this package and the app falls back to
  # relay-only input. LiveKit's distribution is the WebRTC binary that ships tvOS
  # slices (stasel/WebRTC is iOS/macOS only). The netcode it drives is verified by
  # FastlaneTests (`swift test`); the adapter is built for the tvOS Simulator here.
  LiveKitWebRTC:
    url: https://github.com/livekit/webrtc-xcframework
    exactVersion: "144.7559.10"

targets:
  HexStackerTV:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources/HexStackerTV
        excludes:
          - "Generated/**"          # mirrored engine JS, added as a folder ref below
          - "Info.plist"            # generated by XcodeGen; not a source/resource
          - "PrivacyInfo.xcprivacy" # added explicitly below so it lands in resources
      # Apple privacy manifest — must ship at the app-bundle root named
      # PrivacyInfo.xcprivacy (empty: no tracking, no data, no required-reason APIs).
      - path: Sources/HexStackerTV/PrivacyInfo.xcprivacy
        buildPhase: resources
      # Engine JS copied at build time; folder reference so it ships as a
      # directory "engine/" inside the app bundle regardless of contents.
      - path: Sources/HexStackerTV/Generated/engine
        type: folder
        buildPhase: resources
        optional: true
    dependencies:
      - package: HexStackerKit
        product: HexStackerKit
      - package: LiveKitWebRTC
        product: LiveKitWebRTC
    info:
      path: Sources/HexStackerTV/Info.plist
      properties:
        CFBundleDisplayName: HexStacker Party
        # Version + build single-sourced from the MARKETING_VERSION /
        # CURRENT_PROJECT_VERSION build settings below, so Xcode's General tab and
        # the shipped plist can't drift. Bump those, not these.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UIRequiredDeviceCapabilities: [arm64]
        GCSupportsControllerUserInteraction: true
        # Brand-plum launch (bgPrimary #1E1A2B, the LaunchBackground colorset):
        # without UILaunchScreen tvOS synthesizes a systemBackground launch
        # screen, which flashed light grey before the first app frame. Dark
        # style keeps every system surface (hosting-view background, alerts)
        # dark so nothing can flash light during launch or handoffs.
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIUserInterfaceStyle: Dark
        # Only standard TLS (wss/https) is used — exempt from export compliance,
        # so uploads skip the per-build encryption questionnaire.
        ITSAppUsesNonExemptEncryption: false
        # The WebRTC input fastlane (WebRTCFastlane.swift) runs ICE connectivity
        # checks to a phone controller on the same Wi-Fi (host-candidate pairs),
        # which trips the tvOS local-network permission. Declare the purpose string
        # so the prompt reads sensibly and App Review doesn't flag a missing usage
        # description. Relay-only input still works if the user declines.
        NSLocalNetworkUsageDescription: >-
          HexStacker connects to phone controllers on your local network so their
          taps reach the game with the lowest possible delay.
        # The bundled LiveKitWebRTC binary references the camera and microphone
        # capture APIs (part of WebRTC's media stack), so Apple's static scanner
        # requires purpose strings even though HexStacker only uses WebRTC data
        # channels and never captures media. Without these, upload processing fails
        # with ITMS-90683. The prompts never appear at runtime (the APIs are never
        # called); the strings exist solely to satisfy the delivery check.
        NSCameraUsageDescription: >-
          HexStacker Party does not use the camera. This notice is required only
          because its bundled real-time networking library references camera APIs
          the game never calls.
        NSMicrophoneUsageDescription: >-
          HexStacker Party does not use the microphone. This notice is required only
          because its bundled real-time networking library references microphone
          APIs the game never calls.
        # Bundled variable fonts (Resources/fonts/): Orbitron for the HUD voice,
        # Baloo 2 for the brand voice (wordmark lockup, buttons).
        UIAppFonts:
          - "Orbitron[wght].ttf"
          - "Baloo2[wght].ttf"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hexstacker.tv
        TARGETED_DEVICE_FAMILY: "3"            # tvOS
        SWIFT_VERSION: "5.9"
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        # App Store version (public-facing) and build number, used by local/dev
        # builds only: CI release builds (release.yml) override both at archive
        # time, MARKETING_VERSION from the bare-semver git tag (shared with the
        # web release line) and CURRENT_PROJECT_VERSION from the workflow run
        # number (ASC rejects reused build numbers).
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        # Manual App Store distribution signing. Automatic signing can't archive
        # this tvOS app without a registered device (it insists on minting a
        # device-bound *development* profile for the target), so we sign directly
        # with the Apple Distribution cert + an App Store provisioning profile —
        # neither of which is device-bound. Lives here (not the Xcode UI) because
        # XcodeGen regenerates the project. The profile named below must exist in
        # the login keychain / ~/Library/MobileDevice/Provisioning Profiles.
        DEVELOPMENT_TEAM: "5ZH48MPAM3"
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: "Apple Distribution"
        PROVISIONING_PROFILE_SPECIFIER: "HexStacker tvOS App Store"
        # LiveKitWebRTC ships only an arm64 tvOS-Simulator slice (no x86_64), so a
        # generic/CI simulator build that targets both archs fails to link the
        # x86_64 binary. Apple Silicon + real devices are arm64; exclude x86_64 for
        # the simulator SDK so `xcodebuild -sdk appletvsimulator` links cleanly.
        EXCLUDED_ARCHS[sdk=appletvsimulator*]: x86_64
    # The scheme (build + test wiring AND the Archive post-action that synthesizes
    # the LiveKit dSYM) is defined in the top-level `schemes:` block at the bottom
    # of this file. The target-level `scheme:` shorthand can only attach actions to
    # the BuildAction — it silently drops ArchiveAction post-actions — so the full
    # Scheme spec is required to hook Product > Archive.
    preBuildScripts:
      - name: Sync engine JS
        basedOnDependencyAnalysis: false
        script: |
          "${PROJECT_DIR}/scripts/sync-engine.sh" \
            "${PROJECT_DIR}/Sources/HexStackerTV/Generated/engine"

  # XCUITest bundle: launches the app (via the HEXSHOT / HEXDEMO hooks set through
  # launchEnvironment) to capture per-screen screenshots and drive the Siri Remote.
  # Not part of the SwiftPM package; tvOS-only, so it builds through the Xcode
  # project like the app target.
  HexStackerTVUITests:
    type: bundle.ui-testing
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: UITests
    dependencies:
      - target: HexStackerTV
    settings:
      base:
        TARGETED_DEVICE_FAMILY: "3"
        SWIFT_VERSION: "5.9"
        EXCLUDED_ARCHS[sdk=appletvsimulator*]: x86_64
        GENERATE_INFOPLIST_FILE: "YES"   # test bundle has no committed Info.plist

schemes:
  HexStackerTV:
    build:
      targets:
        HexStackerTV: all
    # Run the UI test bundle under the test action so `xcodebuild -scheme
    # HexStackerTV test` picks it up (screenshot capture + remote-driven smoke).
    # The app needs no test-only code: tests select state via HEXSHOT / HEXDEMO
    # launch hooks.
    test:
      targets:
        - HexStackerTVUITests
    archive:
      config: Release
      # LiveKitWebRTC ships as a stripped closed binary with no dSYM, so every
      # archive trips Apple's "archive did not include a dSYM for
      # LiveKitWebRTC.framework" upload warning. This Archive post-action runs for
      # GUI Product > Archive and CLI xcodebuild archive alike, synthesizing a
      # UUID-matching dSYM from the embedded framework binary into the archive's
      # dSYMs/ folder so uploads are clean. The binary is stripped, so the dSYM
      # carries only the symbol table (function-level, no line info) — enough to
      # satisfy Apple's presence check.
      postActions:
        - name: Synthesize LiveKitWebRTC dSYM
          settingsTarget: HexStackerTV
          script: |
            set -eu
            FW="${ARCHIVE_PATH}/Products/Applications/${PRODUCT_NAME}.app/Frameworks/LiveKitWebRTC.framework/LiveKitWebRTC"
            [ -f "${FW}" ] && dsymutil "${FW}" -o "${ARCHIVE_PATH}/dSYMs/LiveKitWebRTC.framework.dSYM" || true
