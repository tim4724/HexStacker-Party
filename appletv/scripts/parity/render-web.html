<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>HexStacker Parity - Web Render</title>
<style>
  html, body { margin: 0; padding: 0; background: #1E1A2B; }
  #board { display: block; }
</style>

<!--
  Cross-engine VISUAL parity reference (web side).

  Loads the SAME engine/theme/renderer modules the live display uses, via
  relative <script src> up to the repo root (parity/ is 3 levels deep:
  parity -> scripts -> appletv -> <repo root>), then draws the fixed fixture
  snapshot onto a canvas at cellSize=40. The native tvOS renderer draws the
  same fixture; visual-compare.mjs samples cell centers in both screenshots.

  Load order (deliberate):
    1. CanvasUtils.js  - hexToRgb / ghostColor / getHexStamp / HEX_UNIT_VERTICES
                         (no other module referenced at load time).
    2. theme.js        - THEME / PIECE_COLORS / STYLE_TIERS / PLAYER_COLORS.
                         Populates GHOST_COLORS via ghostColor(), so it must
                         load AFTER CanvasUtils.
    3. constants.js    - window.GameConstants (computeHexGeometry, COLS, ...).
                         BoardRenderer references GameConstants at module top
                         level, so this must load BEFORE BoardRenderer.
    4. BoardRenderer.js- class BoardRenderer.
-->
<script src="../../../public/shared/CanvasUtils.js"></script>
<script src="../../../public/shared/theme.js"></script>
<script src="../../../server/constants.js"></script>
<script src="../../../public/display/BoardRenderer.js"></script>
</head>
<body>
<canvas id="board"></canvas>
<script>
(function () {
  'use strict';

  var CELL = 40;
  var COLS = GameConstants.COLS;               // 9
  var VISIBLE_ROWS = GameConstants.VISIBLE_ROWS; // 15
  var geo = GameConstants.computeHexGeometry(COLS, VISIBLE_ROWS, CELL);

  // Canvas backing store == board size at 1:1 (no transform on the main ctx),
  // so 1 canvas unit == 1 pixel in a deviceScaleFactor=1 screenshot.
  var canvas = document.getElementById('board');
  canvas.width = Math.ceil(geo.boardWidth);    // 360
  canvas.height = Math.ceil(geo.boardHeight);  // 691
  var ctx = canvas.getContext('2d');

  // --- Inlined fixture snapshot (MUST mirror fixture.json) ---
  // 15x9 grid, all zeros except the bottom row (index 14).
  var grid = [];
  for (var r = 0; r < VISIBLE_ROWS; r++) {
    grid.push([0, 0, 0, 0, 0, 0, 0, 0, 0]);
  }
  grid[VISIBLE_ROWS - 1] = [1, 2, 3, 4, 5, 6, 9, 1, 2];

  var playerState = {
    id: 0,
    grid: grid,
    currentPiece: null,
    ghost: null,
    holdPiece: null,
    nextPieces: [],
    level: 1,
    lines: 0,
    alive: true,
    pendingGarbage: 0,
    clearingCells: null,
    gridVersion: 1
  };

  // Same call signature the display uses: (ctx, x, y, cellSize, playerIndex).
  var renderer = new BoardRenderer(ctx, 0, 0, CELL, 0);
  renderer.render(playerState, 0);

  // Expose geometry for the capture harness / debugging.
  window.__GEO = geo;
  window.__READY = true;
})();
</script>
</body>
</html>
