name: tvOS

# The native tvOS port, guarded against silent drift from the web source. Same
# shape as android.yml (one job, one toolchain invocation per concern): the kit
# suites for engine/render/netcode parity, then the UI-test bundle that builds the
# app and captures the per-state screenshot gallery on a booted Apple TV simulator.
#
# Runs on macOS (free on this public repo). Path-filtered, mirroring android.yml,
# to the inputs that can actually affect the port: the port itself, the engine +
# shared render/protocol sources it mirrors (RoomFlow.js ships inside the core
# bundle and PartyFastlane is natively mirrored), the core-bundle build config, and
# the conformance driver + golden the kit suite replays. Web-only UI changes skip
# the job. workflow_dispatch is kept for capturing screenshots on demand.
on:
  push:
    branches: ['**']
    paths:
      - 'appletv/**'
      - 'server/**'
      - 'public/shared/**'
      - 'partyplug/**'
      - 'scripts/build.js'
      - 'scripts/build-conformance-bundle.js'
      - 'tests/helpers/**'
      - 'tests/fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/tvos.yml'
  workflow_dispatch:

concurrency:
  group: tvos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-screenshots:
    runs-on: macos-15
    timeout-minutes: 40
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      # esbuild + node for build:core: the kit suites rebuild it via TestSupport,
      # and the app pre-build phase runs it via scripts/sync-engine.sh.
      - run: npm ci

      - name: Install XcodeGen + xcparse
        run: |
          set -e
          brew install --quiet xcodegen
          # xcparse pulls the named screenshot attachments out of the .xcresult.
          # Its Homebrew tap compiles it from source (~40s); grab the prebuilt
          # release binary instead and fall back to brew only if that asset ever
          # changes shape (verified by checking the download is a Mach-O binary).
          mkdir -p "$HOME/.local/bin"
          if curl -fsSL https://github.com/ChargePoint/xcparse/releases/download/2.3.2/xcparse.zip -o /tmp/xcparse.zip \
             && unzip -o -j /tmp/xcparse.zip -d "$HOME/.local/bin" \
             && [ -f "$HOME/.local/bin/xcparse" ] \
             && file "$HOME/.local/bin/xcparse" | grep -q 'Mach-O'; then
            chmod +x "$HOME/.local/bin/xcparse"
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
            echo "installed xcparse from the prebuilt release binary"
          else
            echo "prebuilt xcparse unavailable; falling back to the Homebrew tap"
            brew install --quiet chargepoint/xcparse/xcparse
          fi

      - name: Generate the Xcode project
        working-directory: appletv
        run: xcodegen generate

      # Cache the resolved SPM artifacts (LiveKitWebRTC is a large binary
      # xcframework) so we don't re-download it on every run. A project.yml edit
      # shouldn't re-download it: restore the previous cache and let SPM re-resolve.
      - name: Cache SPM artifacts
        uses: actions/cache@v6
        with:
          path: appletv/.build-xcode/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('appletv/project.yml') }}
          restore-keys: spm-${{ runner.os }}-

      # `--continue`-style, mirroring android.yml's single gradle invocation: run
      # BOTH test invocations non-fatally (continue-on-error) so the screenshots
      # always upload and neither result hides the other; the job then fails below
      # if either did.
      #
      #   swift test:      kit suites: render parity vs the canonical web JS,
      #                    frame-golden conformance, engine determinism + game
      #                    loop, netcode, room/host FSM, localization, and the
      #                    live RelayClient socket. None of this runs on Linux.
      #   xcodebuild test: builds + links the app target (the old standalone
      #                    `xcodebuild build` job is redundant with this) and runs
      #                    the UI-test bundle: the single-launch screenshot
      #                    gallery + the remote-driven smoke test. HomeScreenTests
      #                    is skipped in CI (its Top Shelf shot comes back as a
      #                    blurred wallpaper on the headless runner; captured on a
      #                    local Simulator only).
      - name: Kit test suites (render parity, conformance, engine + game loop, netcode, room/host, localization, live relay socket)
        id: kit
        continue-on-error: true
        working-directory: appletv
        run: swift test

      - name: Build the app + capture the screenshot gallery (boots an Apple TV simulator)
        id: screenshots
        continue-on-error: true
        working-directory: appletv
        run: |
          set -o pipefail
          xcodebuild test \
            -project HexStacker.xcodeproj \
            -scheme HexStackerTV \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV,OS=latest' \
            -derivedDataPath .build-xcode \
            -resultBundlePath TestResults.xcresult \
            -skip-testing:HexStackerTVUITests/HomeScreenTests

      # Pull the named screenshot attachments out of the result bundle. Runs even
      # if a test failed, so a regressed screen still ships its capture for review.
      - name: Extract screenshots
        if: always()
        working-directory: appletv
        run: |
          xcparse screenshots TestResults.xcresult screenshots/
          ls -R screenshots || true

      - name: Upload screenshots
        id: upload
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tvos-screenshots
          path: appletv/screenshots
          if-no-files-found: warn

      # Surface a failure from either non-fatal test step above (the screenshots
      # and both results are already uploaded by the time we get here). No sticky PR
      # comment: the TV Gallery workflow consumes the tvos-screenshots artifact and
      # posts the one browsable web/tvOS/Android gallery comment.
      - name: Report test results
        if: always()
        run: |
          fail=0
          [ "${{ steps.kit.outcome }}" = "success" ] || { echo "::error::kit tests (swift test) failed"; fail=1; }
          [ "${{ steps.screenshots.outcome }}" = "success" ] || { echo "::error::screenshot UI tests (xcodebuild test) failed"; fail=1; }
          exit $fail
