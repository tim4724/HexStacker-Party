name: tvOS UI Screenshots

# Boots an Apple TV simulator, runs the XCUITest bundle (per-screen screenshot
# capture + a remote-driven smoke test), publishes the screenshots as an artifact
# and posts a one-click download link in a sticky PR comment (GitHub otherwise
# buries run artifacts several clicks deep). GitHub-hosted macOS runners are
# free on public repos, so this runs per-PR — path-filtered to changes that can
# affect the tvOS render (the app, plus the shared engine/render sources the
# native port mirrors) so web-only PRs don't spin up a simulator. workflow_dispatch
# is kept for capturing screenshots on demand.
on:
  pull_request:
    paths:
      - 'appletv/**'
      - 'server/**'
      - 'public/shared/**'
      - '.github/workflows/tvos-uitest.yml'
  workflow_dispatch:

concurrency:
  group: tvos-uitest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uitest:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write   # post/update the screenshots-link PR comment
      issues: write          # PR comments go through the issues API
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'
      - run: npm ci   # the app pre-build phase runs build:core to bundle the engine JS
      - name: Install XcodeGen + xcparse
        run: brew install --quiet xcodegen chargepoint/xcparse/xcparse
      - name: Generate the Xcode project
        working-directory: appletv
        run: xcodegen generate
      # Cache the resolved SPM artifacts (LiveKitWebRTC is a large binary
      # xcframework) so we don't re-download it every run.
      - name: Cache SPM artifacts
        uses: actions/cache@v4
        with:
          path: appletv/.build-xcode/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('appletv/project.yml') }}
          # A project.yml edit shouldn't re-download the whole LiveKitWebRTC
          # xcframework: restore the previous cache and let SPM re-resolve.
          restore-keys: spm-${{ runner.os }}-
      # `-scheme HexStackerTV` runs the test action wired in project.yml, which
      # builds the app and runs HexStackerTVUITests. The runtime is preinstalled on
      # the macos-15 image (tvOS 18.5 pairs with the default Xcode 16.x); OS=latest
      # avoids pinning a version that image updates may drop.
      - name: Run UI tests (boots an Apple TV simulator, captures screenshots)
        working-directory: appletv
        run: |
          set -o pipefail
          xcodebuild test \
            -project HexStacker.xcodeproj \
            -scheme HexStackerTV \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV,OS=latest' \
            -derivedDataPath .build-xcode \
            -resultBundlePath TestResults.xcresult
      # Pull the named screenshot attachments out of the result bundle. Runs even
      # if a test failed, so a regressed screen still ships its capture for review.
      - name: Extract screenshots
        if: always()
        working-directory: appletv
        run: |
          xcparse screenshots TestResults.xcresult screenshots/
          ls -R screenshots || true
      - name: Upload screenshots
        id: upload
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tvos-screenshots
          path: appletv/screenshots
          if-no-files-found: warn
      # Surface the artifact with a one-click link in a sticky PR comment (updated
      # in place each run), since GitHub buries run artifacts under the run summary.
      # Same-repo PRs only: a fork PR's GITHUB_TOKEN is read-only regardless of the
      # job's `permissions:` block, so the comment API would 403 and fail the job.
      - name: Comment screenshots link on the PR
        if: always() && github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v8
        env:
          ARTIFACT_URL: ${{ steps.upload.outputs.artifact-url }}
        with:
          script: |
            const marker = '<!-- tvos-screenshots -->';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const artifactUrl = process.env.ARTIFACT_URL;
            const link = artifactUrl
              ? `**[Download screenshots](${artifactUrl})** · [workflow run](${runUrl})`
              : `Screenshots artifact not available this run. [workflow run](${runUrl})`;
            const body = [
              marker,
              '### 📺 tvOS screenshots',
              '',
              link,
              '',
              'Captured on the Apple TV Simulator (per-screen). Note: `home-topshelf` blurs on the headless CI runner; it renders crisply on a local Simulator.',
            ].join('\n');
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            // Paginate: on a long PR thread the marker comment falls off page 1
            // and a non-paginated lookup would post duplicates instead of updating.
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find((c) => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body });
            }
