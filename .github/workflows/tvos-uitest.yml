name: tvOS UI Screenshots

# Boots an Apple TV simulator, runs the XCUITest bundle (per-screen screenshot
# capture + a remote-driven smoke test) and publishes the screenshots as an
# artifact the TV Gallery workflow assembles into the per-branch gallery.
# GitHub-hosted macOS runners are free on public repos, so this runs per-PR —
# path-filtered to changes that can affect the tvOS render (the app, plus the
# shared engine/render sources the native port mirrors) so web-only PRs don't
# spin up a simulator. It ALSO runs on main pushes (same paths): PR runs are
# keyed to the PR branch, so without a main run the main TV gallery would
# have no tvOS artifacts to draw from. workflow_dispatch is kept for capturing
# screenshots on demand.
on:
  pull_request:
    paths:
      - 'appletv/**'
      - 'server/**'
      - 'public/shared/**'
      # RoomFlow.js ships inside the core bundle and PartyFastlane is natively
      # mirrored, so partyplug changes can move what the simulator renders.
      - 'partyplug/**'
      - 'scripts/build.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/tvos-uitest.yml'
  push:
    branches: [main]
    paths:
      - 'appletv/**'
      - 'server/**'
      - 'public/shared/**'
      - 'partyplug/**'
      - 'scripts/build.js'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/tvos-uitest.yml'
  workflow_dispatch:

concurrency:
  group: tvos-uitest-${{ github.ref }}
  cancel-in-progress: true

jobs:
  uitest:
    runs-on: macos-15
    timeout-minutes: 45
    permissions:
      contents: read
      pull-requests: write   # post/update the screenshots-link PR comment
      issues: write          # PR comments go through the issues API
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci   # the app pre-build phase runs build:core to bundle the engine JS
      - name: Install XcodeGen + xcparse
        run: brew install --quiet xcodegen chargepoint/xcparse/xcparse
      - name: Generate the Xcode project
        working-directory: appletv
        run: xcodegen generate
      # Cache the resolved SPM artifacts (LiveKitWebRTC is a large binary
      # xcframework) so we don't re-download it every run.
      - name: Cache SPM artifacts
        uses: actions/cache@v6
        with:
          path: appletv/.build-xcode/SourcePackages
          key: spm-${{ runner.os }}-${{ hashFiles('appletv/project.yml') }}
          # A project.yml edit shouldn't re-download the whole LiveKitWebRTC
          # xcframework: restore the previous cache and let SPM re-resolve.
          restore-keys: spm-${{ runner.os }}-
      # `-scheme HexStackerTV` runs the test action wired in project.yml, which
      # builds the app and runs HexStackerTVUITests. The runtime is preinstalled on
      # the macos-15 image (tvOS 18.5 pairs with the default Xcode 16.x); OS=latest
      # avoids pinning a version that image updates may drop.
      - name: Run UI tests (boots an Apple TV simulator, captures screenshots)
        working-directory: appletv
        run: |
          set -o pipefail
          xcodebuild test \
            -project HexStacker.xcodeproj \
            -scheme HexStackerTV \
            -sdk appletvsimulator \
            -destination 'platform=tvOS Simulator,name=Apple TV,OS=latest' \
            -derivedDataPath .build-xcode \
            -resultBundlePath TestResults.xcresult
      # Pull the named screenshot attachments out of the result bundle. Runs even
      # if a test failed, so a regressed screen still ships its capture for review.
      - name: Extract screenshots
        if: always()
        working-directory: appletv
        run: |
          xcparse screenshots TestResults.xcresult screenshots/
          ls -R screenshots || true
      - name: Upload screenshots
        id: upload
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tvos-screenshots
          path: appletv/screenshots
          if-no-files-found: warn
      # No sticky PR comment here: the TV Gallery workflow consumes this
      # artifact and posts the one gallery comment (browsable web/tvOS/Android
      # comparison at <preview-host>/tv-gallery/), which supersedes the old
      # per-platform screenshot links.
