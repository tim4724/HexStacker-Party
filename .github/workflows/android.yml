name: Android TV

# Path-filtered to the inputs that can affect the port (mirroring tvos.yml):
# the port itself, the engine + shared render/protocol sources it mirrors,
# the core-bundle build config, and the conformance driver + golden that
# :core:jvmTest replays in QuickJS. Web-only UI changes skip the Gradle job.
on:
  push:
    branches: ['**']
    paths:
      - 'android/**'
      - 'server/**'
      - 'public/shared/**'
      - 'partyplug/**'
      - 'scripts/build.js'
      - 'scripts/build-conformance-bundle.js'
      - 'tests/helpers/**'
      - 'tests/fixtures/**'
      - 'package.json'
      - 'package-lock.json'
      - '.github/workflows/android.yml'
      - '.github/actions/sticky-comment/**'
  workflow_dispatch:

concurrency:
  group: android-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-screenshots:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7

      # The native core the app runs in QuickJS is the canonical JS engine bundle,
      # so the engine + conformance-golden bundles must be built before Gradle:
      # :tv's preBuild copies dist/partycore.js into assets, and :core:jvmTest loads
      # dist/partycore.js + dist/partycore-frame-test.js as its cross-engine oracles.
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - name: Build engine bundles (QuickJS core + conformance golden driver)
        run: |
          npm run build:core
          node scripts/build-conformance-bundle.js

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v6

      # One --continue invocation so a test failure still runs the rest and the
      # screenshots/reports below always upload:
      #   :core:jvmTest            — 45 engine/render/RoomFlow parity tests
      #   :tv:recordRoborazziDebug — runs the :tv unit tests, rendering the Compose
      #                              screens + Canvas board to PNGs (Robolectric
      #                              native-graphics, no emulator)
      #   :tv:assembleDebug        — the installable TV APK compiles
      - name: Test, render screenshots, assemble APK
        working-directory: android
        run: ./gradlew :core:jvmTest :tv:recordRoborazziDebug :tv:assembleDebug --continue --console=plain --stacktrace

      - name: Upload TV screenshots
        id: screenshots
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: tv-screenshots
          path: android/tv/build/outputs/roborazzi/*.png
          if-no-files-found: error

      # Post (or update in place) a sticky PR comment linking the screenshot
      # artifact, so reviewers reach the 1920x1080 renders without opening the
      # run summary. Runs on push, so the action resolves the PR from the branch.
      - name: Comment screenshot download link on the PR
        if: always() && github.ref != 'refs/heads/main' && steps.screenshots.outputs.artifact-url != ''
        uses: ./.github/actions/sticky-comment
        with:
          marker: '<!-- tv-screenshots -->'
          body: |
            ### 📸 TV screenshots

            [**Download `tv-screenshots`**](${{ steps.screenshots.outputs.artifact-url }}): every screen rendered this run at **1920×1080**.
            Compose lobby / results / overlays plus the Canvas board for 2/3/4 players, captured headless via Robolectric (record-only, for review).

            _Requires being signed in to GitHub; the link expires when the run artifacts do._

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: android-test-reports
          path: |
            android/core/build/reports/tests/
            android/tv/build/reports/tests/
          if-no-files-found: warn
