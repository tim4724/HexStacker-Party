name: Production Deploy

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  build:
    uses: ./.github/workflows/docker-publish.yml
    secrets: inherit
    permissions:
      contents: read
      packages: write
      id-token: write

  deploy:
    runs-on: [self-hosted, k8s]
    needs: build
    environment: production
    steps:
      - name: Install kubectl
        uses: azure/setup-kubectl@v5
        with:
          version: v1.30.0

      - name: Write kubeconfig
        run: |
          echo "${KUBECONFIG_B64}" | base64 -d > kubeconfig
          echo "KUBECONFIG=$PWD/kubeconfig" >> "$GITHUB_ENV"
        env:
          KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}

      - name: Deploy to production
        env:
          TAG: ${{ github.ref_name }}
          GIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          IMAGE="ghcr.io/${REPO}:${TAG}"

          echo "Deploying ${TAG} to production"
          # Single patch = single rollout; separate `set image` + `set env`
          # calls each trigger their own pod replacement.
          kubectl patch deployment/couch-games -n default --patch "
          spec:
            template:
              spec:
                containers:
                  - name: couch-games
                    image: '${IMAGE}'
                    env:
                      - name: APP_ENV
                        value: production
                      - name: GIT_SHA
                        value: '${GIT_SHA}'
          "
          kubectl rollout status deployment/couch-games -n default --timeout=180s

          {
            echo "### Production Deploy ${TAG}"
            echo "- Image: \`${IMAGE}\`"
          } >> "$GITHUB_STEP_SUMMARY"
