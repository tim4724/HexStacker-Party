name: Tests

on:
  push:
    branches: ['**']
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit:
    # Deliberately unfiltered: npm test carries the cross-platform lockstep
    # guards (tests/protocol-{android,swift}-parity.test.js,
    # tests/i18n-android-parity.test.js), which read the native sources under
    # android/ and appletv/, so a native-only push must still run it.
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - run: npm test

  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    container:
      # Keep this tag in sync with @playwright/test in package.json
      image: mcr.microsoft.com/playwright:v1.61.1-noble
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - run: npm ci
      - name: Run E2E tests
        run: npx playwright test --project=e2e --project=e2e-airconsole
