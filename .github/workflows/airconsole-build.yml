name: AirConsole Build

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # The ES2017 transpile step (scripts/transpile-dir.js) requires esbuild
      # from node_modules; without this the build dies on MODULE_NOT_FOUND
      # (broke every tag build from 4.3.0 to 4.4.0).
      - name: Install dependencies
        run: npm ci

      - name: Build AirConsole ZIP
        run: bash scripts/build-airconsole.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/hexstacker-party-airconsole-*.zip
