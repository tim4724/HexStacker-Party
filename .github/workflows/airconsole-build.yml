name: AirConsole Build

on:
  push:
    tags:
      - '[0-9]*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Build AirConsole ZIP
        run: bash scripts/build-airconsole.sh

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: build/hexstacker-party-airconsole-*.zip
