<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Settle Animation Preview</title>
<link rel="stylesheet" href="shared/theme.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #06060f; color: #e0e0ff; font-family: system-ui, sans-serif; overflow-x: hidden; }
  h1 { text-align: center; padding: 24px 0 8px; font-size: 20px; font-weight: 600; letter-spacing: 0.05em; color: #fff; }
  .subtitle { text-align: center; color: #888; font-size: 13px; margin-bottom: 20px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    padding: 0 24px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .card {
    background: #0c0c1a;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .card h2 { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #fff; }
  .card .desc { font-size: 11px; color: #888; margin-bottom: 12px; text-align: center; line-height: 1.4; }
  canvas { border-radius: 4px; cursor: pointer; }
  .hint { font-size: 11px; color: #555; margin-top: 8px; }
  .controls { text-align: center; margin: 0 0 8px; }
  .controls button {
    background: #1a1a3a;
    color: #ccc;
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 6px;
    padding: 6px 16px;
    font-size: 12px;
    cursor: pointer;
    margin: 0 4px;
  }
  .controls button:hover { background: #2a2a4a; color: #fff; }
  .piece-selector { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
  .piece-btn {
    width: 28px; height: 28px; border-radius: 4px; border: 2px solid transparent;
    cursor: pointer; font-size: 11px; font-weight: 700; color: #000;
    display: flex; align-items: center; justify-content: center;
  }
  .piece-btn.active { border-color: #fff; }
</style>
</head>
<body>

<h1>Settle / Lock Animation Variations</h1>
<p class="subtitle">Click any board to replay. Animations extend beyond cell bounds.</p>

<div class="piece-selector" id="piece-selector"></div>
<div class="controls">
  <button id="replay-all-btn">Replay All</button>
</div>

<div class="grid" id="grid"></div>

<script src="preview-settle.js"></script>
</body>
</html>
