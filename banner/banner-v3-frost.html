<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      overflow: hidden;
      background: #06060f;
    }

    .banner {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .display-img {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
    }

    /* Wider gap for frosted strip */
    .display-square {
      clip-path: polygon(0 0, 54% 0, 44% 100%, 0 100%);
    }

    .display-hex {
      clip-path: polygon(56% 0, 100% 0, 100% 100%, 46% 100%);
    }

    /* Variation 3: Frosted glass divider strip with labels */
    .frost-strip {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      clip-path: polygon(54% 0, 56% 0, 46% 100%, 44% 100%);
      background: rgba(20, 20, 40, 0.6);
      backdrop-filter: blur(8px);
      z-index: 5;
    }

    .frost-strip::before,
    .frost-strip::after {
      content: '';
      position: absolute;
      top: 0;
      width: 1px;
      height: 100%;
      background: rgba(255,255,255,0.15);
    }
    .frost-strip::before { left: 0; }
    .frost-strip::after { right: 0; }

    /* Labels rotated along the strip */
    .strip-label {
      position: absolute;
      z-index: 6;
      font-family: 'Orbitron', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.7);
      /* Rotate to match diagonal: atan((55-45)%/100%) ≈ -5.7° */
      transform: rotate(-5.7deg);
      white-space: nowrap;
    }
    .strip-label.top {
      top: 60px;
      left: 50%;
      transform: translateX(-50%) rotate(-5.7deg);
    }
    .strip-label.bottom {
      bottom: 200px;
      left: 46%;
      transform: translateX(-50%) rotate(-5.7deg);
    }

    .overlay-gradient {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(6,6,15,0.85) 0%, rgba(6,6,15,0.15) 35%, transparent 55%);
      pointer-events: none;
    }

    .phone {
      position: absolute;
      bottom: var(--phone-bottom, -18px);
      left: var(--phone-left);
      width: 120px;
      height: var(--phone-height, 195px);
      border-radius: 18px;
      background: #111122;
      border: 1px solid rgba(255,255,255,0.08);
      box-shadow:
        0 10px 40px rgba(0,0,0,0.7),
        0 0 24px color-mix(in srgb, var(--color) 12%, transparent);
      padding: 3px;
      z-index: 10;
    }

    .phone::before {
      content: '';
      position: absolute;
      top: 6px;
      left: 50%;
      transform: translateX(-50%);
      width: 28px;
      height: 8px;
      border-radius: 5px;
      background: #000;
      z-index: 2;
    }

    .phone-screen {
      width: 100%;
      height: 100%;
      border-radius: 15px;
      overflow: hidden;
      background: #080810;
      padding-top: 14px;
    }

    .controller-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: top;
    }
  </style>
</head>
<body>
  <div class="banner">
    <img class="display-img display-square" id="display-img" alt="">
    <img class="display-img display-hex" id="display-hex-img" alt="">
    <div class="frost-strip"></div>
    <div class="strip-label top">Classic ◄</div>
    <div class="strip-label bottom">► Hex</div>
    <div class="overlay-gradient"></div>

    <div class="phone" id="phone-0" style="--phone-left: 16%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-0" alt=""></div>
    </div>
    <div class="phone" id="phone-1" style="--phone-left: 41%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-1" alt=""></div>
    </div>
    <div class="phone" id="phone-2" style="--phone-left: 66%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-2" alt=""></div>
    </div>
    <div class="phone" id="phone-3" style="--phone-left: 90%">
      <div class="phone-screen"><img class="controller-img" id="ctrl-3" alt=""></div>
    </div>
  </div>
</body>
</html>
