# Clean extensionless URLs for the gallery pod, matching the app's /privacy
# and /imprint style: /gallery -> gallery.html, /gallery-tv/ -> index.html.
# Legacy .html URLs keep working via the plain $uri match.
server {
  listen 80;
  root /usr/share/nginx/html;
  index index.html;
  location / {
    try_files $uri $uri.html $uri/ =404;
  }
}
